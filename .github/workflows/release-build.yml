name: Build And Upload Release Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload artifacts to (e.g. v0.1.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (release)
        run: flutter build appbundle --release

      - name: Rename artifacts with version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/wangcai-${RELEASE_TAG}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "build/app/outputs/bundle/release/wangcai-${RELEASE_TAG}.aab"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.release_tag }}
          files: build/app/outputs/flutter-apk/wangcai-${{ github.event.release.tag_name || inputs.release_tag }}.apk

      - name: Upload AAB to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.release_tag }}
          files: build/app/outputs/bundle/release/wangcai-${{ github.event.release.tag_name || inputs.release_tag }}.aab
